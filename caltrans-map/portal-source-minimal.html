<div id="caltrans-map" style="width:100%;height:400px;border:1px solid #ccc;"></div>
<script>
(function(){
  const apiKey = 'YOUR_API_KEY';
  const kmlUrl = 'https://YOUR_KML_URL.kml';
  const center = {lat: 34.521088, lng: -117.940498};
  window.initMap = function(){
    const map = new google.maps.Map(document.getElementById('caltrans-map'), {
      center: center,
      zoom: 14,
      mapTypeId: 'satellite'
    });
    new google.maps.KmlLayer({url: kmlUrl, map: map});
  };
  const s = document.createElement('script');
  s.src = 'https://maps.googleapis.com/maps/api/js?key=' + apiKey + '&callback=initMap';
  document.head.appendChild(s);
})();
</script>
