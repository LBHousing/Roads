<!--
This is a sample HTML block for a portal source editor.
If the portal allows script tags, replace YOUR_API_KEY and YOUR_KML_URL.
-->
<div id="caltrans-kml-map" style="width:100%;height:500px;position:relative;border:1px solid #ccc;border-radius:8px;overflow:hidden;">
  <div style="position:absolute;top:8px;left:8px;z-index:2;padding:8px 10px;background:rgba(255,255,255,0.92);font-family:Arial,sans-serif;font-size:13px;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,0.12);">
    Caltrans project map — loading KML/KMZ...
  </div>
  <div id="caltrans-map-view" style="width:100%;height:100%;"></div>
</div>

<script>
  function initCaltransMap() {
    const map = new google.maps.Map(document.getElementById('caltrans-map-view'), {
      center: { lat: 34.4619, lng: -117.8934 },
      zoom: 12,
      mapTypeId: 'satellite',
      fullscreenControl: true,
      streetViewControl: false,
      mapTypeControl: false,
    });

    new google.maps.KmlLayer({
      url: 'https://YOUR_KML_URL.kml',
      map: map,
      preserveViewport: false,
      suppressInfoWindows: false,
    }).addListener('status_changed', function() {
      const status = this.getStatus();
      if (status !== google.maps.KmlLayerStatus.OK) {
        console.error('KML/KMZ failed to load:', status);
        alert('Unable to load the KML/KMZ file. Check the URL and make sure it is publicly accessible.');
      }
    });
  }
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initCaltransMap"></script>
