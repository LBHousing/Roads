<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caltrans KML/KMZ Viewer</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    .instructions {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      padding: 12px 16px;
      background: rgba(255,255,255,0.92);
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      max-width: 360px;
    }

    .instructions h1 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .instructions p {
      margin: 4px 0;
      font-size: 14px;
      line-height: 1.4;
    }

    .instructions code {
      display: inline-block;
      padding: 2px 4px;
      background: #eef;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="instructions">
    <h1>Caltrans KML/KMZ Map</h1>
    <p>Load a public KML or KMZ file into the map below.</p>
    <p>Replace <code>YOUR_API_KEY</code> and <code>YOUR_KML_URL</code> in the HTML file.</p>
  </div>
  <div id="map"></div>

  <script>
    function initMap() {
      const map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 37.7749, lng: -122.4194 },
        zoom: 12,
        mapTypeId: 'satellite',
        tilt: 45,
        heading: 90,
        streetViewControl: false,
        mapTypeControl: false,
        fullscreenControl: true,
      });

      const kmlUrl = 'https://YOUR_KML_URL.kml';

      const kmlLayer = new google.maps.KmlLayer({
        url: kmlUrl,
        map: map,
        preserveViewport: false,
        suppressInfoWindows: false,
      });

      kmlLayer.addListener('status_changed', () => {
        const status = kmlLayer.getStatus();
        if (status !== google.maps.KmlLayerStatus.OK) {
          console.error('KML failed to load:', status);
          alert('Unable to load the KML/KMZ file. Check the URL and make sure it is publicly accessible.');
        }
      });
    }
  </script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>
</body>
</html>
